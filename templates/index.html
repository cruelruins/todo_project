<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <title>Tehtävälista</title>
    <link rel="stylesheet" href="../static/style.css">
</head>

<body>
<div class="container">
    <h1>Tehtävälista</h1>

    <form id="todoForm">
        <input type="text" id="taskInput" placeholder="Kirjoita tehtävä">
        <button type="submit">Lisää</button>
    </form>

    <ul id="taskList"></ul>

    <script>
        // Haetaan HTML-elementit
        const form = document.getElementById("todoForm");
        const input = document.getElementById("taskInput");
        const taskList = document.getElementById("taskList");

        // Kun lomake lähetetään
        form.addEventListener("submit", function(event) {

            // Estää sivun uudelleenlatauksen
            event.preventDefault();

            // Haetaan käyttäjän kirjoittama teksti
            const taskText = input.value;

            // Tarkistetaan ettei kenttä ole tyhjä
            if (taskText !== "") {

                // Luodaan uusi listaelementti
                const li = document.createElement("li");

                // Luodaan checkbox
                const checkbox = document.createElement("input");
                checkbox.type = "checkbox";

                // Luodaan tehtävän teksti
                const textSpan = document.createElement("span");
                textSpan.textContent = taskText;

                // Kun checkboxia klikataan
                checkbox.addEventListener("change", function() {

                    if (checkbox.checked) {
                        textSpan.style.textDecoration = "line-through";
                        textSpan.style.opacity = "0.6";
                    } else {
                        textSpan.style.textDecoration = "none";
                        textSpan.style.opacity = "1";
                    }

                });

                // Luodaan poista-painike
                const deleteButton = document.createElement("button");
                deleteButton.textContent = "Poista";

                // Kun painiketta klikataan
                deleteButton.addEventListener("click", function() {
                    li.remove();
                });

                // Lisätään elementit listaelementtiin
                li.appendChild(checkbox);
                li.appendChild(textSpan);
                li.appendChild(deleteButton);

                // Lisätään listaelementti sivulle
                taskList.appendChild(li);

                // Tyhjennetään syöttökenttä
                input.value = "";
            }
        });
    </script>
</div>
</body>
</html>
