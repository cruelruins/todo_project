<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <title>Tehtävälista</title>
    <link rel="stylesheet" href="../static/style.css">
</head>

<body>
<div class="container">
    <h1>Tehtävälista</h1>

    <form id="todoForm">
        <input type="text" id="taskInput" placeholder="Kirjoita tehtävä">
        <button type="submit">Lisää</button>
    </form>

<ul id="task-list"></ul>

<script type="application/json" id="tasks-data">
{{ tasks | tojson }}
</script>

<script>
window.addEventListener("load", function() {

    const taskList = document.getElementById("task-list");
    const todoForm = document.getElementById("todoForm");
    const taskInput = document.getElementById("taskInput");

    const savedTasks = JSON.parse(document.getElementById('tasks-data').textContent);

    function addTaskToDOM(taskText) {
        const li = document.createElement("li");

        const checkbox = document.createElement("input");
        checkbox.type = "checkbox";

        const textSpan = document.createElement("span");
        textSpan.textContent = taskText;

        checkbox.addEventListener("change", function() {
            if (checkbox.checked) {
                textSpan.style.textDecoration = "line-through";
                textSpan.style.opacity = "0.6";
            } else {
                textSpan.style.textDecoration = "none";
                textSpan.style.opacity = "1";
            }
        });

        const deleteButton = document.createElement("button");
        deleteButton.textContent = "Poista";

        deleteButton.addEventListener("click", function() {
            fetch("/delete", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ task: taskText })
            })
            .then(response => response.json())
            .then(data => {
                li.remove();
            });
        });

        li.appendChild(checkbox);
        li.appendChild(textSpan);
        li.appendChild(deleteButton);

        taskList.appendChild(li);
    }

    // Load saved tasks
    savedTasks.forEach(addTaskToDOM);

    // Handle form submission
    todoForm.addEventListener("submit", function(e) {
        e.preventDefault(); // prevent page reload
        const taskText = taskInput.value.trim();
        if (!taskText) return; // ignore empty input

        fetch("/add", {  // your Flask route to add tasks
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ task: taskText })
        })
        .then(response => response.json())
        .then(data => {
            addTaskToDOM(taskText); // add new task to DOM
            taskInput.value = "";   // clear input
        });
    });

});
</script>
