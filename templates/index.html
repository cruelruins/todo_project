<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <title>Tehtävälista</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
        }

        input {
            padding: 8px;
        }

        button {
            padding: 8px 12px;
            margin-left: 5px;
        }

        li {
            margin-top: 10px;
        }
    </style>
</head>

<body>

    <h1>Tehtävälista</h1>

    <form id="todoForm">
        <input type="text" id="taskInput" placeholder="Kirjoita tehtävä">
        <button type="submit">Lisää</button>
    </form>

    <ul id="taskList"></ul>

    <script>
        // Haetaan HTML-elementit
        const form = document.getElementById("todoForm");
        const input = document.getElementById("taskInput");
        const taskList = document.getElementById("taskList");

        // Kun lomake lähetetään
        form.addEventListener("submit", function(event) {

            // Estää sivun uudelleenlatauksen
            event.preventDefault();

            // Haetaan käyttäjän kirjoittama teksti
            const taskText = input.value;

            // Tarkistetaan ettei kenttä ole tyhjä
            if (taskText !== "") {

                // Luodaan uusi listaelementti
                const li = document.createElement("li");
                li.textContent = taskText;

                // Luodaan poista-painike
                const deleteButton = document.createElement("button");
                deleteButton.textContent = "Poista";

                // Kun painiketta klikataan
                deleteButton.addEventListener("click", function() {
                    li.remove();
                });

                // Lisätään painike listaelementin sisään
                li.appendChild(deleteButton);

                // Lisätään listaelementti sivulle
                taskList.appendChild(li);

                // Tyhjennetään syöttökenttä
                input.value = "";
            }
        });
    </script>

</body>
</html>
